services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fishing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fishing}
      POSTGRES_DB: ${POSTGRES_DB:-fishingheroes}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fishing} -d ${POSTGRES_DB:-fishingheroes}"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  # Migrations + seed (one-shot). Roda antes da API e encerra.
  migrate:
    build: .
    command: ["/app/migrate"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://fishing:fishing@postgres:5432/fishingheroes?sslmode=disable}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    command: ["/app/api"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://fishing:fishing@postgres:5432/fishingheroes?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      HTTP_ADDR: ${HTTP_ADDR:-:8080}
    ports:
      - "${HTTP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
